version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: deviantart_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deviantart_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: deviantart_redis
    restart: always
    ports:
      - "6379:6379"
  django_admin:
    build: 
      context: ./django_app
    container_name: deviantart_django
    restart: always
    volumes:
      - ./django_app:/app
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/deviantart_db
      - DJANGO_SECRET_KEY=super-secret-key-para-desarrollo
      - DJANGO_DEBUG=True
    depends_on:
      - db
  fastapi_api:
    build: 
      context: ./fastapi_app
    container_name: deviantart_fastapi
    restart: always
    volumes:
      - ./fastapi_app:/app
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/deviantart_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=super-secret-key-para-fastapi-jwt
    depends_on:
      - db
      - redis
  nginx:
    image: nginx:alpine
    container_name: deviantart_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - django_admin
      - fastapi_api
volumes:
  postgres_data:
    name: deviantart_postgres_data
  static_volume:
    name: deviantart_static_volume