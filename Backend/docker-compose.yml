version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: deviantart_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deviantart_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deviantart_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: deviantart_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  django_admin:
    build: 
      context: ./django_app
    container_name: deviantart_django
    restart: always
    volumes:
      - ./django_app:/app
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/deviantart_db
      - DJANGO_SECRET_KEY=super-secret-key-para-desarrollo
      - DJANGO_DEBUG=True
    depends_on:
      db:
        condition: service_healthy
  fastapi_api:
    build: 
      context: ./fastapi_app
    container_name: deviantart_fastapi
    restart: always
    volumes:
      - ./fastapi_app:/app
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/deviantart_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=super-secret-key-para-fastapi-jwt
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/api/v1/healthz')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  nginx:
    build: 
      context: ./nginx
    container_name: deviantart_nginx
    restart: always
    ports:
      - "8080:80"
    volumes:  
      - static_volume:/app/staticfiles:ro
    depends_on:
      - django_admin
      - fastapi_api
  frontend:
    build: ./Frontend
    container_name: deviantart_frontend
    ports:
      - "5173:5173" 
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    command: npm run dev
volumes:
  postgres_data:
    name: deviantart_postgres_data
  static_volume:
    name: deviantart_static_volume